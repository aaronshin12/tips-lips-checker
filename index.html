<style>

{id:13,cat:"기술·R&D",lb:"Q13. 차별화 요소",w:2,q:"사업의 핵심 차별화 요소는?",o:[{t:"브랜드 아이덴티티,\n콘텐츠, 고객 경험",y:"l"},{t:"브랜드와 기술 모두 기여",y:"b"},{t:"독자 알고리즘,\n데이터, 원천기술",y:"t"}]},

{id:19,cat:"사업 기반",lb:"Q19. 브랜드 비중",w:2,q:"브랜드(상호, 콘텐츠, 디자인 등)가 사업 가치의 핵심인가요?",o:[{t:"예, 브랜드가 핵심 자산",y:"l"},{t:"브랜드와 기술 모두 중요",y:"b"},{t:"아니요, 기술/제품 성능이 핵심",y:"t"}]},
{id:20,cat:"사업 기반",lb:"Q20. 최우선 목표",w:2,q:"3년 이내 최우선 목표는?",o:[{t:"흑자 전환 및\n브랜드·거점 확대",y:"l"},{t:"제품 고도화 및\n신규 시장 진입",y:"b"},{t:"기술 상용화 완료 및\n대규모 투자 유치",y:"t"}]}
];
/* ===== TIPS CONDITIONS (8 Qs) ===== */
const TQ=[
{q:"팁스 운영사로부터 투자 규모는?",o:["2억원 이상 투자 유치\n(수도권에 본사를 둔 기업의 경우)","1억원 이상 투자 유치\n(비수도권에 본사를 둔 기업의 경우)","미달 또는 투자 유치 없음"],pass:[0,1],info:"운영사 선투자+추천 필수. 기업 본사 소재지 기준."},
{q:"창업 후 업력이 어떻게 되나요?",o:["7년 이내","7~10년 (12대 신산업 분야)","10년 초과"],pass:[0,1],info:"일반 7년, 12대 신산업 분야는 10년까지 가능."},
{q:"기술 기반의 R&D 과제를 수행할 역량이 있나요?",o:["예","아니요"],pass:0,info:"팁스 R&D 최대 8억원 (24개월) 수행 능력 필요."},
{q:"중소기업기본법상 중소기업에 해당하나요?",o:["예","아니요"],pass:0,info:"중소기업 요건 충족 필수."},
{q:"창업팀이 전체 지분의 60% 이상을 보유하고 있나요?",o:["예 (운영사 지분 30% 이하 유지)","아니요"],pass:0,info:"창업기업 구성원 2인 이상이 60%+ 보유, 운영사 30% 이하."},
{q:"직전 연도 매출액이 20억원 미만인가요?",o:["예, 20억 미만","아니요, 20억 이상"],pass:0,info:"직전 연도 매출 20억원 미만 기업만 지원 가능."},
{q:"기존에 팁스 R&D 사업에 선정된 이력이 있나요?",o:["없음 (첫 신청)","있음 (재참여 불가)"],pass:0,info:"일반·딥테크·글로벌·스케일업 팁스 기선정 기업은 재참여 불가."},

];

const LQ=[
{q:"LIPS 운영사로부터 투자 유치 시점은?",o:["공고일 기준 3년 이내","3년 초과","투자 유치 없음"],pass:0,info:"운영사로부터 3년 이내 투자 유치 실적 필수."},
{q:"운영사 투자금 규모는?",o:["5천만원 이상","3천만원 이상 ~ 5천만원 미만","3천만원 미만 또는 투자 유치 없음"],pass:[0,1],info:"LIPS Ⅱ 시드는 3천만+, 스케일업은 5천만+ 필요."},

{q:"정책자금 융자 제외 업종에 해당하나요?",o:["해당 없음 (지원 가능)","해당됨 (제외 업종)"],pass:0,info:"제외 업종은 지원 불가."}
];

let ph="home",st=0,ans={},dO=false,sO=false,cAns=[],cType="",csO=false;
const $=document.getElementById("app");
const nl=s=>s.replace(/\n/g,"<br>");
const fl=s=>s.replace(/\n/g," ");
function vis(){return FQ.filter(q=>!(q.id===15&&ans[14]!=="t"))}
function calcMax(){return vis().reduce((s,q)=>s+q.w,0)}
function calc(){let l=0,t=0;FQ.forEach(q=>{const a=ans[q.id];if(!a)return;const h=Math.ceil(q.w/2);if(a==="l")l+=q.w;else if(a==="t")t+=q.w;else{l+=h;t+=h}});return{l,t}}
function gr(s,mx){const p=Math.max(0,s)/mx*100;if(p>=75)return{k:"f",l:"적합",d:"해당 프로그램에 높은 부합도"};if(p>=50)return{k:"p",l:"긍정적",d:"방향성은 맞으나 일부 경계 요소"};if(p>=25)return{k:"n",l:"부정적",d:"프로그램과 방향 불일치 다수"};return{k:"u",l:"부적합",d:"해당 프로그램 대상이 아님"}}
const STP=[{k:"u",l:"부적합"},{k:"n",l:"부정적"},{k:"p",l:"긍정적"},{k:"f",l:"적합"}];

function R(){
  window.scrollTo(0,0);
  if(ph==="home")rHome();else if(ph==="fit")rFit();else if(ph==="fitR")rFitR();
  else if(ph==="cond")rCond();else if(ph==="condR")rCondR();
}
function startCond(type){cType=type;cAns=[];st=0;csO=false;ph="cond";R()}
function ctaBtn(){if(!CTA_URL)return"";return`<a href="${CTA_URL}" target="_blank" style="display:block;width:100%;padding:16px 20px;font-size:17px;font-weight:700;border-radius:12px;text-align:center;text-decoration:none;margin-bottom:10px;background:${BR};color:#fff">📩 투자 상담 요청</a>`}
function infoBtn(){return`<a href="${INFO_URL}" target="_blank" rel="noopener" style="display:block;width:100%;padding:14px 20px;font-size:15px;font-weight:600;border-radius:12px;text-align:center;text-decoration:none;margin-bottom:10px;background:linear-gradient(135deg,${BR}18,${BR}08);border:1.5px solid ${BR}33;color:${BR}">📢 창업 지원사업 · 투자 정보 모아보기 →</a>`}

/* FIT TEST */
function rFit(){
  const vq=vis(),tot=vq.length,c=vq[st],pct=(st/tot)*100;
  const stageLabel=c.id<=6?"1단계: 기본 성격":c.id<=13?"2단계: 기술·R&D":"3단계: 사업 기반";
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:15px;font-weight:600;color:${BR}">${st+1} / ${tot}</span>
    ${st>0?`<button onclick="st--;R()" style="font-size:14px;color:${DIM};background:none;border:none;cursor:pointer">← 이전</button>`:""}
  </div>
  <div style="height:3px;background:${BD};border-radius:2px;margin-bottom:28px"><div style="height:100%;width:${pct}%;background:${BR};border-radius:2px;transition:width .3s"></div></div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;background:${BRL};color:${BR}">${stageLabel}</span>
    <span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;background:${CALT};color:${DIM}">${c.cat}</span>
  </div>
  <div style="font-size:18px;font-weight:700;color:${TXT};margin-bottom:6px">${c.lb}</div>
  <div style="font-size:16px;color:${SUB};line-height:1.65;margin-bottom:24px">${c.q}</div>`;
  c.o.forEach(o=>{
    const s=ans[c.id]===o.y;
    const bg=s?(o.y==="l"?LPL:o.y==="t"?TPL:CALT):CARD;
    const bc=s?(o.y==="l"?LP:o.y==="t"?TP:DIM):BD;
    const tc=s?(o.y==="l"?LP:o.y==="t"?TP:TXT):TXT;
    h+=`<button onclick="pFit(${c.id},'${o.y}')" class="opt" style="background:${bg};border:${s?'2px':'1.5px'} solid ${bc};color:${tc};font-weight:${s?600:400}"><span class="radio" style="border:${s?'6px solid '+bc:'2px solid '+BD}"></span><span style="white-space:pre-line">${o.t}</span></button>`;
  });
  if(c.cd)h+=`<div style="margin-top:12px;padding:12px 16px;font-size:14px;line-height:1.7;background:${CALT};border-radius:10px;color:${DIM}">ℹ Q14에서 "불필요" 선택 시에만 노출됩니다.</div>`;
  $.innerHTML=h;
}
function pFit(id,ty){
  ans[id]=ty;if(id===14&&ty!=="t")delete ans[15];
  const nv=vis();
  if(st+1>=nv.length){ph="fitR";R()}else{st++;R()}
}

/* FIT RESULT */
function gBar(sc,mx,lb,pc){
  const g=gr(sc,mx),s=Math.max(0,sc);
  let h=`<div style="margin-bottom:28px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px"><span style="font-size:18px;font-weight:700;color:${pc}">${lb}</span><span style="font-size:16px;font-weight:600;color:${pc}">${s}/${mx}</span></div><div style="display:flex;gap:5px">`;
  STP.forEach(x=>{const a=x.k===g.k;h+=`<div style="flex:1;padding:8px 0;text-align:center;border-radius:8px;font-size:13px;font-weight:${a?700:500};background:${a?pc:CALT};color:${a?'#fff':DIM};${a?'':`border:1px solid ${BD}`}">${x.l}</div>`});
  h+=`</div></div>`;return h;
}
function rFitR(){
  const{l,t}=calc(),mx=calcMax();

  if(dO){h+=`<div style="padding:4px 20px 16px;background:${CARD}">`;FQ.filter(q=>ans[q.id]).forEach(q=>{const a=ans[q.id],o=q.o.find(x=>x.y===a);h+=`<div style="padding:12px 0;border-bottom:1px solid ${BD};font-size:14px;line-height:1.6"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:700;color:${TXT}">${q.lb}</span><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${tBg(a)};color:${tC(a)}">${tL(a)}</span></div><div style="color:${DIM};font-size:13px">${fl(o.t)}</div></div>`});h+=`</div>`}
  h+=`</div>`;
  h+=`<div class="disc">${DISC}</div><div class="divider"></div>`;
  // Circle nav
  const tipsH=t>=l,lipsH=l>=t;
  h+=`<div style="display:flex;justify-content:center;gap:24px;margin-bottom:20px">`;
  [{e:"🔬",l:"TIPS\n지원조건",hi:t>=Math.ceil(mx*0.5),c:TP,bg:TPL,act:"startCond('tips')"},
   {e:"🦁",l:"LIPS\n지원조건",hi:l>=Math.ceil(mx*0.5),c:LP,bg:LPL,act:"startCond('lips')"},
   {e:"🏠",l:"첫 화면",hi:false,c:DIM,bg:CALT,act:"ph='home';R()"}].forEach(it=>{
    h+=`<div onclick="${it.act}" style="display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer">
      <div style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:${it.hi?it.bg:CALT};border:${it.hi?'2.5px solid '+it.c:'1.5px solid '+BD};box-shadow:${it.hi?'0 2px 12px '+it.c+'22':'none'}">${it.e}</div>
      <div style="font-size:12px;font-weight:${it.hi?700:500};text-align:center;line-height:1.3;color:${it.hi?it.c:DIM};white-space:pre-line">${it.l}</div></div>`;
  });
  h+=`</div>`;
  h+=ctaBtn()+infoBtn();
  h+=`<div style="text-align:center;font-size:12px;color:${DIM};padding:8px 0">MAR 2026 by TAP</div>`;

/* CONDITION CHECK */
function getCQ(){return cType==="tips"?TQ:LQ}
function rCond(){
  const qs=getCQ(),c=qs[st],tot=qs.length,pct=(st/tot)*100;
  const pc=cType==="tips"?TP:LP,em=cType==="tips"?"🔬":"🦁",nm=cType==="tips"?"TIPS":"LIPS";

  });
  h+=`<div style="margin-top:16px;padding:12px 16px;font-size:14px;line-height:1.7;background:${CALT};border-radius:10px;color:${DIM}">💡 ${c.info}</div>`;

}
function pCond(i){cAns.push(i);const qs=getCQ();if(st+1>=qs.length){ph="condR";R()}else{st++;R()}}

/* CONDITION RESULT */

    }else{
      h+=`<div style="padding:16px;margin:10px 0;border-radius:12px;background:#fef5f5;border:1px solid #fcd5d5">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span>❌</span><span style="font-size:14px;font-weight:700;color:#c53030">미충족</span></div>
        <div style="font-size:15px;font-weight:600;color:${TXT};line-height:1.5;margin-bottom:4px">${d.q}</div>
        <div style="font-size:14px;color:${SUB}">→ ${fl(d.ans)}</div>

      </div>`;
    }
  });
  // Summary dropdown
  h+=`<div style="border:1.5px solid ${BD};border-radius:12px;margin:20px 0;overflow:hidden"><button onclick="csO=!csO;R()" style="width:100%;padding:14px 20px;font-size:15px;font-weight:600;background:${CALT};color:${SUB};border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center"><span>📌 2026 ${nm} 지원 요약</span><span style="font-size:14px;color:${DIM};display:inline-block;transform:rotate(${csO?180:0}deg)">▼</span></button>`;
  if(csO){
    if(cType==="tips"){
      h+=`<div style="padding:16px 20px;font-size:14px;color:${SUB};line-height:1.9;background:${CARD}">
        📌 일반트랙: R&D 최대 <b>8억원</b> (24개월)<br>📌 딥테크트랙: R&D 최대 <b>15억원</b> (36개월)<br>📌 비R&D 연계: 사업화+마케팅 최대 <b>3억원</b><br>📌 선투자: 수도권 <b>2억+</b> / 비수도권 <b>1억+</b><br>📌 업력: 7년 이내 (신산업 10년)<br>📌 접수: <b>분기별</b> 접수<br>📌 가점: 비수도권 최대 3점, ESG 2점, 퇴직연금 1점 등 최대 5점</div>`;
    }else{
      h+=`<div style="padding:16px 20px;font-size:14px;color:${SUB};line-height:1.9;background:${CARD}">
        📌 LIPS Ⅰ: 투자금 최대 5배, <b>최대 5억</b> 매칭융자<br>📌 LIPS Ⅱ 시드: 투자 3천만+, <b>최대 1억</b> 보조금<br>📌 LIPS Ⅱ 스케일업: 투자 5천만+, <b>최대 2억</b> 보조금<br>📌 업력: <b>1년 이상</b><br>📌 비수도권 추천 의무비율: <b>60%+</b><br>📌 운영사: <b>60개사</b> / 소상공인: <b>300개사</b></div>`;
    }

  h+=`<div style="text-align:center;font-size:12px;color:${DIM};padding:8px 0">MAR 2026 by TAP</div>`;
  $.innerHTML=h;
}
R();
</script>
